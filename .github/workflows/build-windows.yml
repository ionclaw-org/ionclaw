name: Build Windows

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      release:
        type: boolean
        default: false

env:
  BUILD_TYPE: Release
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (x86_64)
            arch: x86_64
            artifact: ionclaw-windows-x86_64

    name: ${{ matrix.name }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web client
        run: |
          cd apps/web
          npm install
          npm run build

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CPM_SOURCE_CACHE }}
            build/release/_deps
          key: cpm-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('cmake/cpm/cpm-dependency.cmake') }}
          restore-keys: cpm-${{ runner.os }}-${{ matrix.arch }}-

      - name: Configure
        run: cmake -B build/release -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
      - name: Build
        run: cmake --build build/release --config ${{ env.BUILD_TYPE }} --parallel

      - name: Verify binary
        run: build/release/bin/ionclaw-server.exe --help

      - name: Package server
        if: ${{ inputs.release }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact }}
          $exe = Get-ChildItem -Path build/release -Recurse -Filter "ionclaw-server.exe" | Select-Object -First 1
          Copy-Item $exe.FullName dist/${{ matrix.artifact }}/
          Copy-Item LICENSE.md dist/${{ matrix.artifact }}/
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifacts
        if: ${{ inputs.release }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

name: Build macOS

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      release:
        type: boolean
        default: false

env:
  BUILD_TYPE: Release
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            arch: arm64
            artifact: ionclaw-macos-arm64
            cmake_extra: ""
          - name: macOS (x86_64)
            arch: x86_64
            artifact: ionclaw-macos-x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: ${{ matrix.name }}
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web client
        run: |
          cd apps/web
          npm install
          npm run build

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CPM_SOURCE_CACHE }}
            build/release/_deps
          key: cpm-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('cmake/cpm/cpm-dependency.cmake') }}
          restore-keys: cpm-${{ runner.os }}-${{ matrix.arch }}-

      - name: Configure
        run: cmake -B build/release -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build/release --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      - name: Verify binary
        if: matrix.cmake_extra == ''
        run: ./build/release/bin/ionclaw-server --help

      - name: Verify binary architecture
        if: matrix.cmake_extra != ''
        run: file build/release/bin/ionclaw-server

      - name: Package server
        if: ${{ inputs.release }}
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp build/release/bin/ionclaw-server dist/${{ matrix.artifact }}/
          cp LICENSE.md dist/${{ matrix.artifact }}/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - name: Upload artifacts
        if: ${{ inputs.release }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
